name: 'Skip Actions CI'
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  setup-skip-test:
    strategy:
      fail-fast: false
      matrix:
        os: ['macos-latest', 'ubuntu-latest']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./setup-skip
      - run: skip doctor
      - run: skip android sdk install --version nightly-main --verbose
      - run: skip checkup
        if: ${{ startsWith(matrix.os, 'macos-') }}

  skip-app-test:
    uses: ./.github/workflows/skip-app.yml
    with:
      repository: skiptools/skipapp-hello

  skip-framework-test:
    uses: ./.github/workflows/skip-framework.yml
    with:
      repository: skiptools/skip-lib

