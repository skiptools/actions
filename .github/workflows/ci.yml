name: 'Skip Actions CI'
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  setup-skip:
    strategy:
      fail-fast: false
      matrix:
        os: ['macos-latest', 'ubuntu-latest']
        brew-source: ['formula', 'cask']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./setup-skip
        with:
          skip-source: ${{ matrix.brew-source }}
      - run: skip doctor
      - run: skip android sdk install --verbose
      - run: skip checkup
        if: ${{ startsWith(matrix.os, 'macos-') }}

  # new skip-application
  skip-application-test:
    uses: ./.github/workflows/skip-application.yml
    with:
      repository: skiptools/skipapp-hello

  # old skip-app
  skip-app-test:
    uses: ./.github/workflows/skip-app.yml
    with:
      repository: skiptools/skipapp-hello

  skip-framework-test:
    uses: ./.github/workflows/skip-framework.yml
    with:
      repository: skiptools/skip-lib
      runs-on: "['macos-15-intel', 'ubuntu-24.04']"

