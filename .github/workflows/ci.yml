name: 'Skip Actions CI'
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
jobs:
  setup-skip:
    strategy:
      fail-fast: false
      matrix:
        os: ['macos-latest', 'ubuntu-latest']
        skip-source: ['formula', 'cask', 'main']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./setup-skip
        with:
          skip-source: ${{ matrix.skip-source }}
      - run: skip doctor
      - run: skip android sdk install --verbose
      - run: skip checkup
        if: ${{ startsWith(matrix.os, 'macos-') }}

