# This workflow is meant to be called remotely from a Skip app project.
#
# The action will build and test both the Swift and Gradle projects
# transpiled through Skip.
#
# When tagged with a semantic version (e.g., "1.2.3"), the action will
# create and distribute release .apk and .ipa artifacts from the project.
#
# An example invocation script is as follows, which runs for
# every push, every PR, every semver tag, and every day at noon GMT:
#
# name: skipapp
# on:
#   push:
#     branches: '*'
#     tags: "[0-9]+.[0-9]+.[0-9]+"
#   workflow_dispatch:
#   pull_request:
#
# permissions:
#   contents: write
#   id-token: write
#   attestations: write
#
# jobs:
#   call-workflow:
#     uses: skiptools/actions/.github/workflows/skip-app.yml@v1
#
name: "Skip App CI"
on:
  workflow_call:
    inputs:
      brew-install:
        required: false
        type: string
      skip-source:
        required: false
        type: string
      run-local-tests:
        required: false
        type: boolean
        default: true
      env:
        description: |
          Newline-separated list of KEY=VALUE environment variables to export
          for every step in the job. Pass via a YAML block scalar:

              env: |
                SKIP_MODE=fuse
                VERBOSE=1

          Useful for app projects whose Package.swift switches dependencies on
          an env var (e.g. SKIP_MODE for the merged showcase). The value is
          treated as plain text, so shell metacharacters are not interpreted.
        required: false
        type: string
        default: ''
      derived-source-branch:
        description: |
          When set, the workflow extracts `skip-export/<MODULE>-project.zip`
          into `Android/derived-src/` and force-pushes the result (HEAD plus
          the derived sources) to this branch in the same repository. Only
          runs on pushes to `main` or to a semver tag. The branch is treated
          as a mirror of HEAD at the time of the run: it is created if absent
          and force-pushed if present, so consumers (e.g. F-Droid build
          metadata) can always check out the current derived form of the app.
        required: false
        type: string
        default: ''
      derived-source-tag-suffix:
        description: |
          When `derived-source-branch` is set and the workflow was triggered
          by a tag push (e.g. `1.2.3`), additionally create and force-push a
          `<tag>-<suffix>` tag (e.g. `1.2.3-fdroid` for suffix `fdroid`)
          pointing at the new derived-branch commit.
        required: false
        type: string
        default: ''
    secrets:
      KEYSTORE_PROPERTIES:
        required: false
      KEYSTORE_JKS:
        required: false
      GOOGLE_PLAY_APIKEY:
        required: false
      APPLE_APPSTORE_APIKEY:
        required: false
      APPLE_CERTIFICATES_P12:
        required: false
      APPLE_CERTIFICATES_P12_PASSWORD:
        required: false
      APPLE_MOBILEPROVISION:
        required: false
jobs:
  skip-app:
    runs-on: macos-26
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          # need to fetch tags to be able to update the version in Skip.env
          fetch-tags: true
          fetch-depth: 0

      # Parse the `env` workflow input (one KEY=VALUE pair per line) and
      # append each entry to $GITHUB_ENV so that it is exported for every
      # subsequent step in this job, as well as for any child processes
      # (gradle, swift, fastlane, skip, …) those steps spawn.
      #
      # The input is passed through an environment variable (not interpolated
      # into the script source) so that special characters in the value do not
      # turn into shell injection.
      - name: "Configure workflow environment"
        if: ${{ inputs.env != '' }}
        env:
          SKIP_WORKFLOW_ENV_INPUT: ${{ inputs.env }}
        run: |
          set -euo pipefail
          # Walk each line of the input; YAML block scalars and folded scalars
          # both deliver newline-separated content here.
          while IFS= read -r entry || [ -n "${entry}" ]; do
            # Trim leading/trailing whitespace; skip empty lines and comments.
            entry="${entry#"${entry%%[![:space:]]*}"}"
            entry="${entry%"${entry##*[![:space:]]}"}"
            [ -z "${entry}" ] && continue
            [[ "${entry}" == \#* ]] && continue
            if [[ "${entry}" != *=* ]]; then
              echo "::warning::Skipping malformed env entry (expected KEY=VALUE): ${entry}"
              continue
            fi
            key="${entry%%=*}"
            value="${entry#*=}"
            # Only allow conventional identifier characters in the key so this
            # cannot be coerced into writing arbitrary GITHUB_ENV directives.
            if [[ ! "${key}" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
              echo "::warning::Skipping env entry with invalid key '${key}'"
              continue
            fi
            echo "Setting workflow env: ${key}"
            echo "${key}=${value}" >> "${GITHUB_ENV}"
          done <<< "${SKIP_WORKFLOW_ENV_INPUT}"

      - name: "Setup"
        id: setup
        env:
          KEYSTORE_PROPERTIES: ${{ secrets.KEYSTORE_PROPERTIES }}
        run: |
          # convert "refs/tags/1.0.0" to "1.0.0"
          # and "refs/heads/main" to "main"
          TAG=${GITHUB_REF#refs/*/}
          # the version if it matches the semantic tag pattern, otherwise "dev"
          echo "RELTAG=${TAG:-'dev'}" >> $GITHUB_ENV

          echo "HOMEBREW_PREFIX: ${HOMEBREW_PREFIX}"
          # needed for Android/fastlane/Fastfile Gradle build on X86
          # or else it cannot find the gradle command
          if [[ "${RUNNER_ARCH}" == 'ARM64' ]]; then
            echo "HOMEBREW_PREFIX=/opt/homebrew" >> $GITHUB_ENV
          else
            echo "HOMEBREW_PREFIX=/usr/local" >> $GITHUB_ENV
          fi

          echo "COMMIT_DATE=$(git log -1 --format=%ad --date=iso-strict ${TAG})" >> $GITHUB_ENV

          # the primary skip module is the first product name
          SKIP_MODULE=$(basename Darwin/*.xcodeproj .xcodeproj)
          echo "SKIP_MODULE=${SKIP_MODULE}" >> $GITHUB_ENV

          # update Skip.env to set version string to the latest semver tag
          sed -i '' "s;MARKETING_VERSION = .*;MARKETING_VERSION = $(git describe --tags --abbrev=0 --match '[0-9]*\.[0-9]*\.[0-9]*' --first-parent);g" Skip.env

          # update Skip.env to set build number to the git commit count
          sed -i '' "s;PRODUCT_VERSION = .*;PRODUCT_VERSION = $(git rev-list --count HEAD);g" Skip.env

          # the emulator we use should match the host architecture
          echo "android-arch=$(uname -m | sed 's/arm64/arm64-v8a/')" >> $GITHUB_OUTPUT

          # check whether the KEYSTORE_PROPERTIES secret exists,
          # and if so we will run the signing option later
          echo 'android-keystore-exists=$(test -z "${KEYSTORE_PROPERTIES}" && echo "false" || echo "true")' >> $GITHUB_OUTPUT

          # check whether any of the skip.yml files in the project
          # presume the native toolchain
          yq -e '.skip.mode' Sources/*/Skip/skip.yml >> /dev/null && echo "skip-fuse=true" >> $GITHUB_OUTPUT || echo "Native toolchain not needed"

      - uses: skiptools/actions/setup-skip@v1
        with:
          verify-project: '.'
          skip-source: '${{ inputs.skip-source }}'
          install-swift-android-sdk: ${{ steps.setup.outputs.skip-fuse }}

      - name: "Run Tests"
        if: ${{ inputs.run-local-tests == true && ! startsWith(github.ref, 'refs/tags/') }}
        run: test ! -d Tests || skip test

      # for release signing, if we are not using the Android
      # KEYSTORE_PROPERTIES secrets, when we will fall back to using
      # the debug key, which might not yet exist, so create it if needed
      - name: "Configure Android debug keystore"
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: "Configure Android App Signing"
        if: ${{ env.KEYSTORE_PROPERTIES != '' }}
        env:
          KEYSTORE_JKS: ${{ secrets.KEYSTORE_JKS }}
          KEYSTORE_PROPERTIES: ${{ secrets.KEYSTORE_PROPERTIES }}
        run: |
          echo -n "${KEYSTORE_JKS}" | base64 --decode > Android/app/keystore.jks
          echo -n "${KEYSTORE_PROPERTIES}" | base64 --decode > Android/app/keystore.properties

      - name: "Configure Darwin App Signing"
        uses: apple-actions/import-codesign-certs@v6
        if: ${{ env.APPLE_CERTIFICATES_P12 != '' }}
        env:
          APPLE_CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATES_P12_PASSWORD }}

      - name: "Export project"
        run: |
          skip export -d skip-export --verbose --release --appindex --show-tree --summary-file=$GITHUB_STEP_SUMMARY
          cp -a Package.resolved skip-export/

      # When `derived-source-branch` is configured, extract the project zip
      # produced by `skip export` into Android/derived-src/, then force-push
      # the current HEAD plus those files to that branch. The branch is
      # therefore always a mirror of the most recent main/tag build plus the
      # derived sources, which is the input format consumed by build systems
      # like F-Droid that need to see the transpiled Kotlin/Gradle output in
      # the repository itself.
      #
      # Runs only on pushes to `main` or to a semver tag, so feature
      # branches and pull requests don't churn the derived branch. The bot
      # commit author is the GitHub Actions bot, and the push uses the
      # workflow's `${{ github.token }}` (which requires the caller workflow
      # to declare `permissions: contents: write`).
      - name: "Update derived source branch"
        if: ${{ inputs.derived-source-branch != '' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
        env:
          DERIVED_BRANCH: ${{ inputs.derived-source-branch }}
          DERIVED_TAG_SUFFIX: ${{ inputs.derived-source-tag-suffix }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PROJECT_ZIP="skip-export/${SKIP_MODULE}-project.zip"
          if [ ! -f "${PROJECT_ZIP}" ]; then
            echo "::error::Expected ${PROJECT_ZIP} produced by 'skip export' was not found"
            exit 1
          fi

          # Extract the zip into a temp folder. The archive is rooted at a
          # single directory named after the Skip module, which we strip so
          # the working layout matches the project's Android source tree.
          TMP_DERIVED=$(mktemp -d)
          unzip -q "${PROJECT_ZIP}" -d "${TMP_DERIVED}"
          ROOT_ENTRY=$(ls "${TMP_DERIVED}")
          if [ "$(printf '%s\n' "${ROOT_ENTRY}" | wc -l)" -ne 1 ]; then
            echo "::error::Expected exactly one top-level folder inside ${PROJECT_ZIP}; got: ${ROOT_ENTRY}"
            exit 1
          fi

          # Replace Android/derived-src wholesale so removed files in the
          # latest export don't linger from a previous run.
          rm -rf Android/derived-src
          mkdir -p Android/derived-src
          # The trailing /. copies contents (not the directory itself).
          cp -a "${TMP_DERIVED}/${ROOT_ENTRY}/." Android/derived-src/
          rm -rf "${TMP_DERIVED}"

          # Configure the bot identity for the commit that will end up on
          # the derived branch and tag.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add Android/derived-src so the commit still includes the
          # extracted files even if the project's .gitignore excludes them.
          # `git add -u` picks up tracked-file edits made by earlier steps
          # (e.g. the version bumps the Setup step writes into Skip.env).
          git add -A -f Android/derived-src
          git add -u

          SOURCE_REF="${GITHUB_REF#refs/*/}"
          SOURCE_SHA=$(git rev-parse HEAD)
          if git diff --cached --quiet; then
            # Nothing changed since the last derived push; reuse the local
            # HEAD as-is when we force-push so the branch still tracks the
            # latest source commit.
            echo "Derived sources are already in sync; pushing source HEAD unchanged."
          else
            git commit -m "Derived sources for ${SOURCE_REF} (${SOURCE_SHA})"
          fi

          # Force-push the (possibly new) HEAD to the configured derived
          # branch. This intentionally rewrites the branch — its job is to
          # mirror the source ref plus the derived-src/, not to accumulate
          # history of its own.
          git push origin "HEAD:refs/heads/${DERIVED_BRANCH}" --force

          # On tag pushes, optionally apply a suffixed tag at the new
          # derived-branch tip so downstream tooling can pin to a specific
          # release of the derived form (e.g. `1.2.3-fdroid`).
          if [ -n "${DERIVED_TAG_SUFFIX}" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            SOURCE_TAG="${GITHUB_REF#refs/tags/}"
            DERIVED_TAG="${SOURCE_TAG}-${DERIVED_TAG_SUFFIX}"
            echo "Tagging derived branch as ${DERIVED_TAG}"
            git tag -f "${DERIVED_TAG}"
            git push origin "refs/tags/${DERIVED_TAG}" --force
          fi

      - name: "Validate appindex.json"
        run: |
          cat skip-export/appindex.json | jq .

      - name: "Android Fastlane"
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        working-directory: Android
        run: test ! -d fastlane || fastlane assemble

      - name: "Darwin Fastlane"
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        working-directory: Darwin
        run: test ! -d fastlane || FASTLANE_SKIP_ARCHIVE=YES FASTLANE_SKIP_CODESIGNING=YES FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT=300 FASTLANE_XCODEBUILD_SETTINGS_RETRIES=5 fastlane assemble

      - name: "Submit iOS App to App Store"
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.APPLE_APPSTORE_APIKEY != '' }}
        working-directory: Darwin
        env:
          APPLE_APPSTORE_APIKEY: ${{ secrets.APPLE_APPSTORE_APIKEY }}
        run: |
          echo -n "${{ secrets.APPLE_APPSTORE_APIKEY }}" | base64 --decode -o fastlane/apikey.json
          fastlane release

      - name: "Submit Android App to Play Store"
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.GOOGLE_PLAY_APIKEY != '' }}
        env:
          GOOGLE_PLAY_APIKEY: ${{ secrets.GOOGLE_PLAY_APIKEY }}
        working-directory: Android
        run: |
          echo -n "${GOOGLE_PLAY_APIKEY}" | base64 --decode > fastlane/apikey.json
          fastlane release

      - name: "Create release checksums"
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: skip-export
        run: shasum -a 256 *.* > checksums.txt

      - uses: actions/attest@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-checksums: skip-export/checksums.txt

      - name: "Create GitHub Release"
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        # Create a release or upload the assets if the release already exists
        run: gh release create "${RELTAG}" -t "Release ${RELTAG}" --generate-notes skip-export/*.* || gh release upload "${RELTAG}" --clobber skip-export/*.*

      - name: "Upload Build Artifacts"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          path: skip-export/

