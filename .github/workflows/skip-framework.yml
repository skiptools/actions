# This workflow is meant to be called remotely from a Skip framework project.
#
# The action will build and test both the Swift and Gradle projects 
# transpiled through Skip.
#
# When tagged with a semantic version (e.g., "1.2.3"), the action will
# create and distribute release .aar and .jar artifacts from the project.
#
# An example invocation script is as follows, which runs for 
# every push, every PR, every semver tag, and every day at noon GMT:
#
# name: skiplib
# on:
#   push:
#     branches: '*'
#     tags: "[0-9]+.[0-9]+.[0-9]+"
#   schedule:
#     - cron: '0 12 * * *'
#   workflow_dispatch:
#   pull_request:
# 
# permissions:
#   contents: write
# 
# jobs:
#   call-workflow:
#     uses: skiptools/actions/.github/workflows/skip-framework.yml@v1
# 
name: "Skip Framework CI"
on:
  workflow_call:
    inputs:
      # Need an Intel macOS runner to be able to run the Android emulator
      # https://github.com/ReactiveCircus/android-emulator-runner/issues/350
      runs-on:
        required: false
        type: string
        default: "['macos-15-intel']"
      brew-install:
        required: false
        type: string
      install-swift:
        required: false
        type: string
      run-export:
        required: false
        type: boolean
        default: true
      run-local-tests:
        required: false
        type: boolean
        default: true
      run-ios-tests:
        required: false
        type: boolean
        default: true
      run-android-tests:
        required: false
        type: boolean
        default: true
      android-native-disabled:
        required: false
        type: boolean
        default: false
      run-android-native-build:
        required: false
        type: string
      emulator-api-level:
        required: false
        type: string
        default: '28'
      emulator-channel:
        required: false
        type: string
        default: 'stable'
      emulator-profile:
        required: false
        type: string
        default: 'medium_phone'
      emulator-target:
        required: false
        type: string
        default: 'default'

jobs:
  skip-framework:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.runs-on) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    #env:     
      #DEVELOPER_DIR: /Applications/Xcode_26.1.app/Contents/Developer
      #DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup Environment
        id: setup
        run: |
          # convert "refs/tags/1.0.0" to "1.0.0"
          # and "refs/heads/main" to "main"
          TAG=${GITHUB_REF#refs/*/}
          # the version if it matches the semantic tag pattern, otherwise "dev"
          echo "RELTAG=${TAG:-'dev'}" >> $GITHUB_ENV
          # the emulator we use should match the host architecture
          echo "android-arch=$(uname -m | sed 's/arm64/arm64-v8a/')" >> $GITHUB_OUTPUT
          if [[ ${{ inputs.android-native-disabled }} != true ]]; then
            # check whether we use skip-bridge and so need the Android toolchain
            SKIP_BRIDGE=1 swift package resolve
            test -d Sources/SkipBridge || jq -e '.pins | any(.identity == "skip-bridge")' Package.resolved >> /dev/null && echo "skip-fuse=true" >> $GITHUB_OUTPUT || echo "Swift Android toolchain not required"
          fi

          if [[ "${{ inputs.run-android-native-build }}" == "true" ]]; then
            echo "skip-fuse=true" >> $GITHUB_OUTPUT
          fi

      - uses: skiptools/actions/setup-skip@v1
        with:
          verify-project: '.'
          swift-version: ${{ inputs.install-swift }}
          install-swift-android-sdk: ${{ steps.setup.outputs.skip-fuse }}
          swift-android-sdk-version: nightly-6.3

      - name: Install Prerequisities
        if: ${{ inputs.brew-install != '' }}
        run: brew install ${{ inputs.brew-install }}

      - name: Get swift version
        run: swift --version

      - name: Swift Android Toolchain Build
        if: ${{ inputs.run-android-native-build == 'true' || (steps.setup.outputs.skip-fuse == 'true' && inputs.run-android-native-build != 'false') }}
        run: skip android build --verbose

      - name: Export project
        if: ${{ inputs.run-export == true }}
        run: |
          rm -rf .build .swiftpm Package.resolved
          skip export -v -d skip-export --show-tree --summary-file=$GITHUB_STEP_SUMMARY

      - name: Test Local Swift & Robolectric
        if: ${{ inputs.run-local-tests == true && !startsWith(github.ref, 'refs/tags/') }}
        # workaround for Swift 5.9 error: "error: invalid tool type in 'tools' map" (https://github.com/swiftlang/swift-package-manager/issues/6755)
        run: |
          rm -rf .build .swiftpm Package.resolved
          if [ ${RUNNER_OS} == 'Linux' ]; then
            # skip test does not yet work on Linux ("SkipDrive not linked")
            swift test
          else
            skip test --verbose
          fi

      - name: Test iOS (connected)
        if: ${{ runner.os == 'macOS' && inputs.run-ios-tests == true && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          # list the current devices that are available
          xcrun simctl list devices available

          # choose a pre-installed simulator based on the macos runner
          if [[ "${{ matrix.os }}" == "macos-13"* ]]; then
            SIMDEVICE="iPhone 15"
          elif [[ "${{ matrix.os }}" == "macos-14"* ]]; then
            SIMDEVICE="iPhone 16"
          elif [[ "${{ matrix.os }}" == "macos-15"* ]]; then
            SIMDEVICE="iPhone 17"
          elif [[ "${{ matrix.os }}" == "macos-26"* ]]; then
            SIMDEVICE="iPhone 17"
          else
            # e.g., "macos-latest" or self-hosted/custom runner
            SIMDEVICE="iPhone 17"
          fi

          # run the tests against the first listed scheme, which for a
          # single-module package will just be "project-name",
          # and for a multi-module package will be "project-name-Package"
          # We also need to reverse sort so we will get "project-name-Package"
          # before some other module that might come earlier (like "Auth")
          SKIP_TEST_MODULE=$(xcodebuild -list -json | jq -r '.workspace.schemes | sort_by(.) | reverse | .[0]')
          echo "Testing Skip module: ${SKIP_TEST_MODULE} from schemes list: $(xcodebuild -list -json | jq -r '.workspace.schemes[]')"
          SKIP_ZERO=1 xcodebuild test -sdk iphonesimulator -destination "platform=iOS Simulator,name=${SIMDEVICE}" -skipMacroValidation -skipPackagePluginValidation -configuration debug -scheme ${SKIP_TEST_MODULE}

      - name: Create and Launch Android emulator
        if: ${{ inputs.run-android-tests == true && env.RUNNER_ARCH != 'ARM64' }}
        run: |
          if [ "${RUNNER_OS}" == 'Linux' ]; then
            # set up hardware acceleration for emulator
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

            # need to free disk space or the emulator fails to launch sometimes
            sudo rm -rf /opt/microsoft /opt/google /opt/az /usr/share/miniconda /usr/share/az* /usr/share/glade* /usr/local/share/chromium /usr/local/share/powershell /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/julia* /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          fi

          export ANDROID_USER_HOME=$HOME/.android
          export ANDROID_EMULATOR_HOME=$ANDROID_USER_HOME
          export ANDROID_AVD_HOME=$ANDROID_EMULATOR_HOME/avd

          skip android emulator create --android-api-level="${{ inputs.emulator-api-level }}" --device-profile="${{ inputs.emulator-profile }}" --verbose
          skip android emulator list --verbose
          skip android emulator launch --background --verbose

      - name: Test Android (connected)
        # Android emulator needs to be disabled for macOS ARM machines
        # due to lack of nested virtualization on the M1 runner machines
        # (https://github.com/ReactiveCircus/android-emulator-runner/issues/350)
        if: ${{ inputs.run-android-tests == true && env.RUNNER_ARCH != 'ARM64' }}
        run: |
          adb logcat *:E TestRunner:V & swift test --filter XCSkipTests

      - name: "Release"
        if: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d "skip-export" ]; then
            gh release create "${RELTAG}" -t "Release ${RELTAG}" --generate-notes skip-export/*.*
          else
            gh release create "${RELTAG}" -t "Release ${RELTAG}" --generate-notes
          fi

